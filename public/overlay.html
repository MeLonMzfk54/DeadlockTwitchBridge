<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitch Overlay</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: transparent;
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }
    .toast {
      position: fixed;
      left: 24px;
      bottom: 24px;
      min-width: 320px;
      max-width: 480px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(10, 16, 24, 0.88);
      border: 1px solid rgba(107, 220, 139, 0.45);
      color: #e8eef5;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .toast .label {
      display: inline-block;
      margin-bottom: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(107, 220, 139, 0.16);
      color: #6bdc8b;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .toast .title {
      margin: 0 0 8px;
      font-size: 1.08rem;
      line-height: 1.3;
      color: #f3f8ff;
      font-weight: 700;
      word-break: break-word;
    }
    .toast .meta {
      margin: 0;
      color: #8fa0b5;
      font-size: 0.9rem;
      line-height: 1.35;
      word-break: break-word;
    }
    .toast .meta strong {
      color: #c6d3e0;
      font-weight: 600;
    }
    .toast .meta + .meta {
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="label" id="toastLabel">Twitch Reward</div>
    <div class="title" id="toastTitle">Эффект активирован</div>
    <p class="meta" id="toastViewerMeta"></p>
    <p class="meta" id="toastMeta"></p>
  </div>

  <script>
    let lastEventTs = 0;

    async function poll() {
      try {
        const status = await fetch("/api/status").then((r) => r.json());
        const latest = status.recentEvents.find((e) =>
          e.type === "effect_applied" || e.type === "reward_received"
        );
        if (latest && latest.timestamp > lastEventTs) {
          lastEventTs = latest.timestamp;
          const data = latest.data ?? {};
          const viewer = data.viewer ? String(data.viewer) : "";
          const reward = data.reward ? String(data.reward) : "";
          const rewardName = data.rewardName ? String(data.rewardName) : "";
          const rewardLabel = reward || rewardName;
          let meta = rewardLabel;
          if (!meta && data.params?.heroIds) {
            const heroIds = Array.isArray(data.params.heroIds)
              ? data.params.heroIds
              : String(data.params.heroIds).split(",").map((s) => s.trim()).filter(Boolean);
            meta = `heroes: ${heroIds.join(", ")}`;
          }
          showToast({
            title: latest.message,
            meta,
            viewer,
            isRewardEvent: latest.type === "reward_received",
          });
        }
      } catch {}
    }

    function showToast({ title, meta, viewer, isRewardEvent }) {
      const toast = document.getElementById("toast");
      const label = document.getElementById("toastLabel");
      const viewerMeta = document.getElementById("toastViewerMeta");
      const commonMeta = document.getElementById("toastMeta");

      label.textContent = isRewardEvent ? "Reward Received" : "Effect Activated";
      document.getElementById("toastTitle").textContent = title;
      viewerMeta.textContent = viewer ? `Заказал: ${String(viewer)}` : "";
      commonMeta.textContent = meta ? `Награда: ${String(meta)}` : "";

      toast.classList.add("visible");
      setTimeout(() => toast.classList.remove("visible"), 5000);
    }

    setInterval(poll, 1500);
    poll();
  </script>
</body>
</html>
